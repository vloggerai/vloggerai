<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLOG.AI</title>

<style>
:root {
  --pink: #ff00cc;
  --blue: #3333ff;
  --bg: #07070c;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('banner.png') center/cover no-repeat;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* DARK + NEON OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 70% 50%, rgba(255,0,200,0.25), transparent 40%),
    radial-gradient(circle at 30% 30%, rgba(51,51,255,0.25), transparent 40%),
    rgba(0,0,0,0.65);
}

/* CONTENT */
.hero-content {
  position: relative;
  text-align: center;
  padding: 20px;
  max-width: 900px;
}

/* HEADLINE */
.hero h1 {
  font-size: 3rem;
  font-weight: bold;
  line-height: 1.2;

  background: linear-gradient(45deg, #fff, #ff00cc, #3333ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 20px rgba(255,0,200,0.5),
    0 0 40px rgba(51,51,255,0.3);
}

.hero p {
  margin-top: 15px;
  opacity: 0.85;
}

/* BUTTONS */
.btn {
  margin-top: 20px;
  padding: 14px 28px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  color: white;

  background: linear-gradient(45deg, #ff00cc, #3333ff);
  box-shadow:
    0 0 15px rgba(255,0,200,0.6),
    0 0 30px rgba(51,51,255,0.4);

  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 30px;

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 0 20px rgba(255,0,200,0.2),
    0 0 40px rgba(51,51,255,0.1);
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
  margin-top: 20px;
}

.stat {
  padding: 15px;
  border-radius: 15px;
  background: rgba(0,0,0,0.4);
}

.stat h2 {
  color: #ff00cc;
}

/* NAVBAR */
.nav {
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
}

.nav a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  opacity: 0.8;
}

.wallet {
  padding: 10px 18px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.2);
}

/* MOBILE */
@media(min-width:768px){
  .hero h1 { font-size: 4rem; }
  .stats { grid-template-columns: repeat(4,1fr); }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div><strong>VLOG.AI</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Tokenomics</a>
    <a href="#">Roadmap</a>
  </div>
  <div class="wallet">Connect Wallet</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <h1>
      CREATE. SHARE.<br>
      EARN. REPEAT.
    </h1>

    <p>
      AI-powered meme economy where viral content earns real tokens.
    </p>

    <button class="btn">🚀 Buy $VLOG</button>

    <!-- GLASS PANEL -->
    <div class="glass">
      <h3>$VLOG Price</h3>
      <h2 id="price">$0.000123</h2>

      <div class="stats">
        <div class="stat">
          <h2>1M+</h2>
          <p>Users</p>
        </div>
        <div class="stat">
          <h2>50M+</h2>
          <p>Videos</p>
        </div>
        <div class="stat">
          <h2>100M+</h2>
          <p>Views</p>
        </div>
        <div class="stat">
          <h2>15K+</h2>
          <p>Creators</p>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
// FAKE LIVE PRICE
setInterval(()=>{
  document.getElementById("price").innerText =
    "$" + (Math.random()*0.001).toFixed(6);
},2000);
</script>

</body>
</html>
